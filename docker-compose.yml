services:
  stronghold-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stronghold-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1401:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  stronghold-rabbitmq:
    image: rabbitmq:3-management
    container_name: stronghold-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  stronghold-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stronghold-api
    ports:
      - "5147:5147"
    env_file:
      - .env
    environment:
      - DB_HOST=stronghold-db
      - RABBITMQ_HOST=stronghold-rabbitmq
      - FILE_STORAGE_PATH=/app/uploads
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      stronghold-db:
        condition: service_healthy
      stronghold-rabbitmq:
        condition: service_healthy

  stronghold-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: stronghold-worker
    env_file:
      - .env
    environment:
      - DB_HOST=stronghold-db
      - RABBITMQ_HOST=stronghold-rabbitmq
    depends_on:
      stronghold-db:
        condition: service_healthy
      stronghold-rabbitmq:
        condition: service_healthy

volumes:
  sqlserver-data:
  rabbitmq-data:
  api-uploads:
