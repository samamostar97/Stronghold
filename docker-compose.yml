services:
  stronghold-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stronghold-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1401:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  stronghold-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stronghold-api
    ports:
      - "5147:5147"
    env_file:
      - .env
    environment:
      - DB_HOST=stronghold-db
      - FILE_STORAGE_PATH=/app/uploads
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      stronghold-db:
        condition: service_healthy

volumes:
  sqlserver-data:
  api-uploads:
